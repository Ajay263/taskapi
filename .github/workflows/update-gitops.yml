name: Update GitOps

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

env:
  IMAGE_NAME: ajay263/taskapi

jobs:
  update-gitops:
    name: "📦 Update GitOps Repo"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout taskapi-gitops
        uses: actions/checkout@v4
        with:
          repository: Ajay263/taskapi-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in dev overlay
        working-directory: gitops/taskapi-gitops/overlays/dev
        run: |
          NEW_TAG="sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)"
          kustomize edit set image taskapi=ghcr.io/${{ env.IMAGE_NAME }}:${NEW_TAG}
          echo "Updated dev overlay to image tag: ${NEW_TAG}"

      - name: Commit and push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taskapi-gitops/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(deploy): update taskapi to sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)

            Source: ${{ github.event.workflow_run.repository.full_name }}@${{ github.event.workflow_run.head_sha }}
            Triggered by: ${{ github.event.workflow_run.html_url }}"
          git push
