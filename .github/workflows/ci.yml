name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taskapi

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: Unit Tests
  # Purpose: Prove the Python code is correct.
  # If tests fail, nothing else runs — no point scanning broken code.
  # ══════════════════════════════════════════════════════════════
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      # Run pytest from the repo root so 'app.main' import path resolves correctly
      - name: Run tests with coverage
        run: |
          python -m pytest app/tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      # Block the build if coverage drops below 80%
      # Low coverage = untested code that could break silently
      - name: Enforce coverage threshold (80%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {rate:.1f}%')
          if rate < 80:
              raise SystemExit(f'Coverage {rate:.1f}% is below 80% threshold')
          print('✅ Coverage OK')
          "

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  # ══════════════════════════════════════════════════════════════
  # JOB 2: Dependency Vulnerability Scan
  # Purpose: Find known CVEs in requirements.txt before building.
  # ══════════════════════════════════════════════════════════════
  scan-deps:
    name: "🔍 Dependency Scan (Snyk)"
    runs-on: ubuntu-latest
    needs: test   # Only run if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Snyk dependency scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --file=app/requirements.txt
        # Allow this step to fail until SNYK_TOKEN is configured (Phase 16)
        continue-on-error: ${{ secrets.SNYK_TOKEN == '' }}

  # ══════════════════════════════════════════════════════════════
  # JOB 3: Build Docker Image + Security Scan
  # Key principle: SCAN BEFORE PUSH. Never push a vulnerable image.
  # ══════════════════════════════════════════════════════════════
  build-and-scan:
    name: "🐳 Build & Scan Container"
    runs-on: ubuntu-latest
    needs: test   # Only run if tests pass
    permissions:
      contents: read
      packages: write         # Push to GitHub Container Registry
      security-events: write  # Upload scan results to GitHub Security tab

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags based on branch and commit
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short   # sha-abc1234 on every push
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}      # v1.0.0 when a git tag is pushed

      # Build the image but load it locally — DO NOT push yet
      # We scan it first. If the scan fails, we never push.
      - name: Build image (local only, not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan-target
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy scans the locally-built image for CVEs
      # exit-code: 1 → the CI step FAILS if CRITICAL CVEs are found
      # The image is NEVER pushed if this fails
      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan-target
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: 1   # FAIL on CRITICAL CVEs
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: container-scan

      # Also scan Kubernetes YAML for misconfigurations
      - name: Scan Kubernetes manifests (Trivy IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # Warn but don't fail yet (tightened in Phase 16)

      # Only push if the image scan passed (exit-code 1 above would have failed the job)
      - name: Push image to GHCR
        id: push
        uses: docker/build-push-action@v5
        if: github.ref == 'refs/heads/main'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════
  # JOB 4: Update GitOps Repository
  # Purpose: After a successful build, update the image tag in
  # taskapi-gitops so ArgoCD deploys the new version.
  # This is the CD (Continuous Delivery) part.
  # ══════════════════════════════════════════════════════════════
  update-gitops:
    name: "📦 Update GitOps Repo"
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout taskapi-gitops
        uses: actions/checkout@v4
        with:
          repository: YOUR_USERNAME/taskapi-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in dev overlay
        working-directory: gitops/overlays/dev
        run: |
          NEW_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kustomize edit set image taskapi=ghcr.io/${{ env.IMAGE_NAME }}:${NEW_TAG}
          echo "Updated dev overlay to image tag: ${NEW_TAG}"

      - name: Commit and push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(deploy): update taskapi to sha-$(echo ${{ github.sha }} | cut -c1-7)

            Source: ${{ github.repository }}@${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push