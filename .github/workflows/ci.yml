name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ajay263/taskapi    # ← lowercase — GHCR requires this

jobs:
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "taskapi/app/requirements.txt"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest app/tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Enforce coverage threshold (80%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {rate:.1f}%')
          if rate < 80:
              raise SystemExit(f'Coverage {rate:.1f}% is below 80% threshold')
          print('✅ Coverage OK')
          "

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            taskapi/test-results.xml
            taskapi/coverage.xml

  scan-deps:
    name: "🔍 Dependency Scan (Snyk)"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Snyk dependency scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --file=taskapi/app/requirements.txt
        continue-on-error: true

  build-and-scan:
    name: "🐳 Build & Scan Container"
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build image (local only, not pushed)
        uses: docker/build-push-action@v5
        with:
          context: taskapi
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan-target
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan-target
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: container-scan
        continue-on-error: true

      - name: Push image to GHCR
        id: push
        uses: docker/build-push-action@v5
        if: github.ref == 'refs/heads/main'
        with:
          context: taskapi
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: "📦 Update GitOps Repo"
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout taskapi-gitops
        uses: actions/checkout@v4
        with:
          repository: Ajay263/taskapi-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in dev overlay
        working-directory: gitops/taskapi-gitops/overlays/dev
        run: |
          NEW_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kustomize edit set image taskapi=ghcr.io/${{ env.IMAGE_NAME }}:${NEW_TAG}
          echo "Updated dev overlay to image tag: ${NEW_TAG}"

      - name: Commit and push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taskapi-gitops/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(deploy): update taskapi to sha-$(echo ${{ github.sha }} | cut -c1-7)

            Source: ${{ github.repository }}@${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push
